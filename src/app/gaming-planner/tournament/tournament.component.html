<div class="mt-4 ps-4">
  <h1>Torneos</h1>
</div>

<mat-card class="card-main rounded-4 mt-4 ms-4">

  <div class="container py-4 ps-4">
    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let tournament of tournamentList">
        <mat-card class="card bg-dark text-light">
          <mat-card-header class="justify-content-center fs-3">
            {{ tournament.name }}
          </mat-card-header>

          <mat-card-content class="d-flex flex-column gap-4 mt-4">
            <div class="d-flex justify-content-around info-matches rounded-4 p-2"
            *ngFor="let game of getGamesByTournament(tournament.idTournament)"
            >
              <div>{{ game.date | date: 'dd/MM/yyyy' }}</div>
              <div>{{ game.result }}</div>
              <div>
                <button
                  *ngIf="this.userRol == '1' || this.userRol == '2' || this.userRol == '5'"
                  mat-icon-button class="btn-delete" color="warn" type="button"
                  (click)="deleteGameTeam(game)"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>

</mat-card>
